<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abyssal Bubble Popper</title>
    <style>
        :root {
            --deep-ocean: #020617;
            --surface-ocean: #075985;
        }

        body {
            margin: 0;
            height: 100vh;
            /* Background Gradient with movement */
            background: linear-gradient(180deg, var(--surface-ocean), var(--deep-ocean));
            background-size: 200% 200%;
            animation: oceanFlow 12s ease-in-out infinite;
            overflow: hidden;
            touch-action: none;
            user-select: none; 
            -webkit-user-select: none;
        }

        @keyframes oceanFlow {
            0% { background-position: 50% 0%; }
            50% { background-position: 55% 100%; }
            100% { background-position: 50% 0%; }
        }

        .bubble {
            position: absolute;
            border-radius: 50%;
            /* Glassmorphism + 3D Effect */
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            
            /* Inner glow and highlights for 3D depth */
            box-shadow: 
                inset 0 10px 20px rgba(255, 255, 255, 0.3),
                inset 0 -10px 20px rgba(0, 0, 0, 0.2),
                0 5px 15px rgba(0, 0, 0, 0.3);
            
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: floatUp linear forwards;
            pointer-events: auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 3D Reflection Spot */
        .bubble::after {
            content: '';
            position: absolute;
            top: 15%;
            left: 15%;
            width: 25%;
            height: 25%;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            filter: blur(1px);
        }

        @keyframes floatUp {
            from { transform: translateY(0); }
            to { transform: translateY(-115vh); }
        }

        .pop {
            position: absolute;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(0px);
            pointer-events: none;
            animation: explode 0.2s ease-out forwards;
        }

        @keyframes explode {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.6); opacity: 0; }
        }
    </style>
</head>
<body>

<script>
    document.addEventListener('mousedown', (e) => {
        if (e.target.classList.contains('bubble')) {
            popBubble(e.target);
            return;
        }
        createBubble(e.clientX, e.clientY);
    });

    function createBubble(x, y) {
        const bubble = document.createElement('div');
        const size = Math.random() * 50 + 40;
        const duration = Math.random() * 4 + 4;
        
        // Random colored glass tint
        const hue = Math.floor(Math.random() * 360);
        
        bubble.className = 'bubble';
        bubble.style.width = `${size}px`;
        bubble.style.height = `${size}px`;
        bubble.style.left = `${x - size / 2}px`;
        bubble.style.top = `${y - size / 2}px`;
        bubble.style.animationDuration = `${duration}s`;
        
        // Apply color tint while maintaining transparency
        bubble.style.backgroundColor = `hsla(${hue}, 70%, 70%, 0.15)`;
        bubble.style.borderColor = `hsla(${hue}, 70%, 80%, 0.4)`;

        document.body.appendChild(bubble);
        setTimeout(() => { if(bubble.parentNode) bubble.remove(); }, duration * 1000);
    }

    function popBubble(el) {
        const rect = el.getBoundingClientRect();
        const pop = document.createElement('div');
        pop.className = 'pop';
        pop.style.width = el.style.width;
        pop.style.height = el.style.height;
        pop.style.left = `${rect.left}px`;
        pop.style.top = `${rect.top}px`;
        pop.style.borderColor = el.style.borderColor;

        document.body.appendChild(pop);
        el.remove();
        setTimeout(() => pop.remove(), 200);
    }
</script>
</body>
</html>
