<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clean Bubble Popper</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: #0f172a;
            overflow: hidden;
            touch-action: none;
            /* FIX: Prevents text selection/blinking on rapid clicks */
            user-select: none; 
            -webkit-user-select: none;
        }

        .bubble {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, 
                rgba(255, 255, 255, 0.4) 0%, 
                rgba(255, 255, 255, 0) 70%);
            box-shadow: inset 0 0 15px rgba(255, 255, 255, 0.2);
            border: 0.5px solid rgba(255, 255, 255, 0.3);
            /* Linear vertical movement only - NO wobble */
            animation: floatUp linear forwards;
            pointer-events: auto;
        }

        @keyframes floatUp {
            from { transform: translateY(0); }
            to { transform: translateY(-110vh); }
        }

        .pop {
            position: absolute;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.5);
            pointer-events: none;
            animation: explode 0.15s ease-out forwards;
        }

        @keyframes explode {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

<script>
    document.addEventListener('mousedown', (e) => {
        // Use mousedown for faster response than 'click'
        if (e.target.classList.contains('bubble')) {
            popBubble(e.target);
            return;
        }
        createBubble(e.clientX, e.clientY);
    });

    function createBubble(x, y) {
        const bubble = document.createElement('div');
        const size = Math.random() * 50 + 30;
        const duration = Math.random() * 3 + 3;
        const hue = Math.floor(Math.random() * 360);
        
        bubble.className = 'bubble';
        bubble.style.width = `${size}px`;
        bubble.style.height = `${size}px`;
        bubble.style.left = `${x - size / 2}px`;
        bubble.style.top = `${y - size / 2}px`;
        bubble.style.animationDuration = `${duration}s`;
        bubble.style.filter = `hue-rotate(${hue}deg)`;

        document.body.appendChild(bubble);
        setTimeout(() => { if(bubble.parentNode) bubble.remove(); }, duration * 1000);
    }

    function popBubble(el) {
        const rect = el.getBoundingClientRect();
        const pop = document.createElement('div');
        pop.className = 'pop';
        pop.style.width = el.style.width;
        pop.style.height = el.style.height;
        pop.style.left = `${rect.left}px`;
        pop.style.top = `${rect.top}px`;

        document.body.appendChild(pop);
        el.remove();
        setTimeout(() => pop.remove(), 150);
    }
</script>
</body>
</html>
