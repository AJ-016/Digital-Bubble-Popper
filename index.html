<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abyssal Fragment Popper</title>
    <style>
        :root {
            --deep-ocean: #020617;
            --surface-ocean: #075985;
        }

        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(180deg, var(--surface-ocean), var(--deep-ocean));
            background-size: 200% 200%;
            animation: oceanFlow 12s ease-in-out infinite;
            overflow: hidden;
            touch-action: none;
            user-select: none; 
            -webkit-user-select: none;
            font-family: sans-serif;
        }

        @keyframes oceanFlow {
            0% { background-position: 50% 0%; }
            50% { background-position: 55% 100%; }
            100% { background-position: 50% 0%; }
        }

        #zen-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            color: white;
            cursor: pointer;
            z-index: 100;
        }

        .bubble, .micro-bubble {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(4px);
            box-shadow: inset 0 5px 10px rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            pointer-events: auto;
        }

        .bubble { animation: floatUp linear forwards; }
        
        .bubble::after {
            content: '';
            position: absolute;
            top: 15%; left: 15%;
            width: 25%; height: 25%;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
        }

        @keyframes floatUp {
            from { transform: translateY(0); }
            to { transform: translateY(-115vh); }
        }

        /* Micro-bubble specific style */
        .micro-bubble {
            pointer-events: none;
            transition: transform 0.6s cubic-bezier(0, .9, .5, 1), opacity 0.6s ease-out;
        }
    </style>
</head>
<body>

<button id="zen-toggle">Zen Mode: OFF</button>

<script>
    let zenMode = false;
    let zenInterval;

    document.getElementById('zen-toggle').addEventListener('click', (e) => {
        e.stopPropagation();
        zenMode = !zenMode;
        e.target.innerText = `Zen Mode: ${zenMode ? 'ON' : 'OFF'}`;
        if (zenMode) startZen(); else clearInterval(zenInterval);
    });

    document.addEventListener('mousedown', (e) => {
        if (e.target.id === 'zen-toggle') return;
        if (e.target.classList.contains('bubble')) {
            popBubble(e.target);
            return;
        }
        createBubble(e.clientX, e.clientY);
    });

    function createBubble(x, y, isAuto = false) {
        const bubble = document.createElement('div');
        const size = Math.random() * 40 + 30;
        const duration = Math.random() * 4 + 4;
        const hue = Math.floor(Math.random() * 360);
        
        bubble.className = 'bubble';
        bubble.style.width = `${size}px`;
        bubble.style.height = `${size}px`;
        bubble.style.left = `${x - size / 2}px`;
        bubble.style.top = `${y - size / 2}px`;
        bubble.style.animationDuration = `${duration}s`;
        bubble.style.backgroundColor = `hsla(${hue}, 70%, 70%, 0.15)`;
        bubble.style.borderColor = `hsla(${hue}, 70%, 80%, 0.4)`;

        document.body.appendChild(bubble);

        if (isAuto) {
            setTimeout(() => {
                if (bubble.parentNode && zenMode) popBubble(bubble);
            }, (duration * 0.25 * 1000) + Math.random() * 3000);
        }
        setTimeout(() => bubble.remove(), duration * 1000);
    }

    function popBubble(el) {
        const rect = el.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        const color = el.style.backgroundColor;
        const borderColor = el.style.borderColor;

        // Create 4-6 micro-bubbles
        for (let i = 0; i < 5; i++) {
            createMicroBubble(centerX, centerY, color, borderColor);
        }

        el.remove();
    }

    function createMicroBubble(x, y, color, border) {
        const micro = document.createElement('div');
        const size = Math.random() * 10 + 5;
        
        micro.className = 'micro-bubble';
        micro.style.width = `${size}px`;
        micro.style.height = `${size}px`;
        micro.style.left = `${x - size / 2}px`;
        micro.style.top = `${y - size / 2}px`;
        micro.style.backgroundColor = color;
        micro.style.borderColor = border;

        document.body.appendChild(micro);

        // Random direction for fragments
        const angle = Math.random() * Math.PI * 2;
        const velocity = Math.random() * 100 + 50;
        const tx = Math.cos(angle) * velocity;
        const ty = Math.sin(angle) * velocity;

        // Animate and remove
        requestAnimationFrame(() => {
            micro.style.transform = `translate(${tx}px, ${ty}px) scale(0.1)`;
            micro.style.opacity = '0';
        });

        setTimeout(() => micro.remove(), 600);
    }

    function startZen() {
        zenInterval = setInterval(() => {
            createBubble(Math.random() * window.innerWidth, window.innerHeight + 50, true);
        }, 800);
    }
</script>
</body>
</html>
